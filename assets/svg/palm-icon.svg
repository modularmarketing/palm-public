<svg width="40" height="40" viewBox="0 0 40 40" fill="none" role="img" aria-label="PALM">
  <!-- Background square: PALM brand near-black -->
  <rect width="40" height="40" fill="currentColor"/>
  <!-- Top accent stripe: PALM brand red -->
  <rect width="40" height="10.5" fill="#EB5546"/>
  <!-- Upper accent stripe: PALM brand orange -->
  <rect width="40" height="6" fill="#F6834F"/>
  <!-- P letterform in cream on near-black background -->
  <!-- Vertical stem -->
  <rect x="9" y="13" width="4" height="19" fill="#FEEFD0"/>
  <!-- P bowl top bar -->
  <rect x="9" y="13" width="14" height="4" fill="#FEEFD0"/>
  <!-- P bowl right curve (simplified as rect) -->
  <rect x="19" y="13" width="4" height="4" fill="#FEEFD0"/>
  <!-- P bowl middle bar -->
  <rect x="9" y="24" width="14" height="4" fill="#FEEFD0"/>
  <!-- P bowl right side -->
  <rect x="19" y="17" width="4" height="7" fill="#FEEFD0"/>
  <!-- Teal accent dot: bottom right -->
  <rect x="26" y="30" width="5" height="5" fill="var(--color-teal, #48A9A6)"/>
</svg>
